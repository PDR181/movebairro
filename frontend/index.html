<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MoveBairro</title>

  <!-- MAPA -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial;
      background: #f4f7fb;
    }

    .container {
      max-width: 1100px;
      margin: auto;
      padding: 20px;
    }

    .hero {
      background: #2563eb;
      color: white;
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 20px;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    button {
      padding: 10px;
      border: none;
      border-radius: 8px;
      color: white;
      cursor: pointer;
    }

    .btn-start { background: green; }
    .btn-location { background: blue; }
    .btn-finish { background: red; }
    .btn-history { background: purple; }
    .btn-ranking { background: orange; color: black; }

    .card {
      background: white;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 20px;
    }

    #map {
      height: 400px;
      border-radius: 10px;
    }
  </style>
</head>

<body>
<div class="container">

  <div class="hero">
    <h1>MoveBairro</h1>
  </div>

  <div class="actions">
    <button class="btn-start" onclick="startActivity()">Iniciar</button>
    <button class="btn-location" onclick="sendLocation()">Localização</button>
    <button class="btn-finish" onclick="finishActivity()">Finalizar</button>
    <button class="btn-history" onclick="loadHistory()">Histórico</button>
    <button class="btn-ranking" onclick="loadRanking()">Ranking</button>
  </div>

  <div class="card">
    <b>Status:</b>
    <p id="status">Aguardando...</p>
  </div>

  <!-- MAPA -->
  <div class="card">
    <h3>Mapa</h3>
    <div id="map"></div>
  </div>

  <div class="card">
    <h3>Histórico</h3>
    <div id="activitiesList"></div>
  </div>

  <div class="card">
    <h3>Ranking</h3>
    <div id="rankingList"></div>
  </div>

</div>

<script>
let activityId = null;

// MAPA
let map;
let polyline;
let path = [];

function initMap() {
  map = L.map('map').setView([-21.22, -43.77], 15);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png')
    .addTo(map);

  polyline = L.polyline([], { color: 'blue' }).addTo(map);
}

initMap();

function setStatus(msg) {
  document.getElementById("status").innerText = msg;
}

async function startActivity() {
  const res = await fetch("http://localhost:3000/activities/start", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ userId: 1 })
  });

  const data = await res.json();
  activityId = data.activity.id;

  path = [];
  polyline.setLatLngs([]);

  setStatus("Atividade iniciada");
}

function sendLocation() {
  if (!activityId) return alert("Inicie primeiro");

  navigator.geolocation.getCurrentPosition(async pos => {

    const lat = pos.coords.latitude;
    const lng = pos.coords.longitude;

    // desenha no mapa
    const point = [lat, lng];
    path.push(point);
    polyline.setLatLngs(path);
    map.setView(point, 17);

    await fetch("http://localhost:3000/activities/location", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        activityId,
        latitude: lat,
        longitude: lng
      })
    });

    setStatus("Localização enviada");
  });
}

async function finishActivity() {
  await fetch("http://localhost:3000/activities/finish", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ activityId })
  });

  activityId = null;
  setStatus("Finalizado");
}

async function loadHistory() {
  const res = await fetch("http://localhost:3000/activities");
  const data = await res.json();

  const div = document.getElementById("activitiesList");
  div.innerHTML = JSON.stringify(data, null, 2);
}

async function loadRanking() {
  const res = await fetch("http://localhost:3000/activities/ranking");
  const data = await res.json();

  const div = document.getElementById("rankingList");
  div.innerHTML = JSON.stringify(data, null, 2);
}
</script>

</body>
</html>
